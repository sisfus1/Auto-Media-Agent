<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Daily News</title>
    <style>
        /* 仿 China Daily / 现代 App 风格 */
        :root {
            --primary: #003366; /* 深蓝主色调 */
            --accent: #D32F2F;  /* 红色点缀 */
            --bg: #F4F6F8;
            --card-bg: #FFFFFF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
            padding-left: 15px;
        }
        h1 { margin: 0; font-size: 24px; color: var(--primary); }
        .date { color: #666; font-size: 14px; margin-top: 5px; }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .card:active { transform: scale(0.98); }
        
        .tag {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            color: white;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .tag.头条 { background-color: var(--accent); }
        .tag.工具 { background-color: #0288D1; }
        .tag.视觉 { background-color: #7B1FA2; }
        .tag.行业 { background-color: #388E3C; }

        .title {
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 8px 0;
            line-height: 1.4;
        }
        .summary {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .meta {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .read-more {
            text-decoration: none;
            color: var(--primary);
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Daily Intelligence</h1>
        <div class="date" id="currentDate">Loading...</div>
    </header>

    <div id="news-container">
        <!-- 新闻卡片将通过 JS 插入这里 -->
    </div>

    <script>
        // 读取本地生成的 data.json
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('currentDate').innerText = data.date;
                const container = document.getElementById('news-container');
                
                // 假设 data.news 是一个数组
                const newsList = Array.isArray(data) ? data : (data.news || []);

                newsList.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="tag ${item.category.replace(/[^\u4e00-\u9fa5]/g, '')}">${item.category}</div>
                        <h3 class="title">${item.title}</h3>
                        <p class="summary">${item.summary}</p>
                        <div class="meta">
                            <span style="font-size:10px; color:#999">热度: ${item.score}/10</span>
                            <a href="${item.link}" class="read-more" target="_blank">阅读全文 →</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('news-container').innerHTML = '<p style="text-align:center">暂无最新数据，请运行 Python 脚本更新。</p>';
            });
    </script>
</body>
</html>
